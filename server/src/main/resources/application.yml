server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:poker_roguelike.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: demo-secret-key-change-in-production-2026
  expiration: 86400000

logging:
  level:
    com.github.jisaaa.poker: DEBUG
